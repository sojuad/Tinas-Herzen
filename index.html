<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Weltkarte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-title">Welt<span>karte</span></div>
    <div class="brand-sub">places.json · read-only</div>
  </div>
</header>

<main class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Filter &amp; Suche</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search" class="search" placeholder="Ort oder Notiz suchen …" autocomplete="off"/>
      </div>
      <div id="chips" class="filter-wrap"></div>
    </div>

    <div class="count-bar" id="countBar">Lade …</div>

    <div id="list" class="list"></div>

    <!-- PREVIEW -->
    <div id="preview" class="preview hidden">
      <div class="preview-title" id="previewTitle"></div>
      <div class="preview-meta" id="previewMeta"></div>
      <img id="previewImg" class="preview-img hidden" alt=""/>
      <div id="previewNoImg" class="preview-noimg" style="display:none">Kein Foto hinterlegt</div>
      <div id="previewNote" class="preview-note hidden"></div>
      <div style="margin-top:8px">
        <button id="previewLink" class="smallbtn" style="display:none">🔗 Link öffnen</button>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <section class="mapwrap">
    <div id="map"></div>
    <div id="toast" class="toast"></div>
  </section>

</main>

<script src="./app.js"></script>
</body>
</html>
